name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'ga'

      - name: Restore
        run: dotnet restore

      - name: Test
        run: dotnet test --configuration Release --verbosity minimal

      - name: Publish
        run: dotnet publish binpatchwin.csproj -c Release -r win-x64 --self-contained -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o publish

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: publish/binpatchwin.exe
          generate_release_notes: true
