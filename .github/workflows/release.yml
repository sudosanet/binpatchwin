name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'バージョン (例: v1.0.0)'
        required: true
        type: string

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Create and push tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          git tag ${{ inputs.version }}
          git push origin ${{ inputs.version }}

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'ga'

      - name: Restore
        run: dotnet restore

      - name: Test
        run: dotnet test --configuration Release --verbosity minimal

      - name: Publish (self-contained)
        run: dotnet publish binpatchwin.csproj -c Release -r win-x64 --self-contained -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o publish-self-contained

      - name: Publish (framework-dependent)
        run: dotnet publish binpatchwin.csproj -c Release -r win-x64 --no-self-contained -p:PublishSingleFile=true -o publish-fdd

      - name: Rename artifacts
        shell: bash
        run: |
          mv publish-self-contained/binpatchwin.exe "publish-self-contained/binpatchwin-self-contained.exe"
          mv publish-fdd/binpatchwin.exe "publish-fdd/binpatchwin.exe"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: |
            publish-fdd/binpatchwin.exe
            publish-self-contained/binpatchwin-self-contained.exe
          generate_release_notes: true
          body: |
            ## ダウンロード

            | ファイル | サイズ | 説明 |
            |---------|--------|------|
            | `binpatchwin.exe` | 約200KB | .NET 10 ランタイムが必要（軽量版） |
            | `binpatchwin-self-contained.exe` | 約110MB | ランタイム同梱版（インストール不要） |

            .NET 10 ランタイムのインストール方法は [README](https://github.com/sudosanet/binpatchwin#動作環境) を参照してください。
